<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>iubanova · MyAccount</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            min-height: 100vh;
            font-family: system-ui, 'Segoe UI', 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        .bg-layer {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background-image: url('https://uplgov.github.io/iubanova-TestOnly/images/38bc3bc2-f526-493d-bb36-cea3da725038.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(32px) brightness(0.32);
            transform: scale(1.1);
            z-index: 0;
        }

        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 1.2rem 2rem;
            z-index: 100;
            background: transparent;
            backdrop-filter: blur(8px);
        }
        .nav-home {
            background: rgba(20,22,30,0.7);
            border: 1px solid rgba(255,215,140,0.4);
            border-radius: 60px;
            padding: 6px 24px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #f0e9da;
            cursor: pointer;
            font-family: 'GDS Transport', system-ui;
            transition: 0.2s;
        }
        .nav-home:hover {
            background: rgba(60,55,75,0.85);
            border-color: #e6c878;
            transform: scale(1.02);
        }

        .card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 540px;
            margin: 4.5rem 1.5rem 3rem;
            background: rgba(10, 12, 18, 0.65);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 2rem 2rem 2.5rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.08);
        }

        .brand { text-align: center; margin-bottom: 1rem; }
        .brand h1 {
            font-family: 'GDS Transport', system-ui;
            font-weight: 450;
            font-size: 2rem;
            background: linear-gradient(135deg, #f5f0e8 0%, #d9d2c5 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .byline {
            text-align: center;
            font-size: 0.95rem;
            font-style: italic;
            font-family: 'Times New Roman', Georgia, 'Playfair Display', serif;
            color: rgba(220, 210, 180, 0.9);
            margin-top: 0.25rem;
            margin-bottom: 2rem;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            width: auto;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        .oauth-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
        .oauth-btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(20, 22, 30, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 60px;
            padding: 12px 0;
            font-size: 1rem;
            font-weight: 500;
            color: rgba(245, 240, 230, 0.95);
            cursor: pointer;
            backdrop-filter: blur(4px);
            overflow: hidden;
        }
        .oauth-btn img { width: 24px; height: 24px; object-fit: contain; pointer-events: none; }
        .oauth-btn:hover { background: rgba(45, 48, 60, 0.9); border-color: rgba(255, 215, 140, 0.5); transform: scale(1.01); }
        .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0 20px; color: rgba(180, 170, 150, 0.5); font-size: 0.75rem; }
        .line { flex: 1; height: 1px; background: rgba(255,255,220,0.2); }

        .input-group { margin-bottom: 20px; position: relative; }
        .input-field {
            width: 100%;
            background: rgba(15, 15, 22, 0.85);
            border: 1px solid rgba(255,255,210,0.25);
            border-radius: 60px;
            padding: 14px 20px;
            font-size: 0.95rem;
            color: #f0ede8;
            outline: none;
        }
        .input-field:focus { border-color: rgba(230, 200, 120, 0.7); background: rgba(20, 20, 28, 0.95); }
        .arrow-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 30px;
            background: rgba(230,200,120,0.2);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #e6d5a8;
            font-size: 1.2rem;
        }
        .submit-btn {
            width: 100%;
            background: rgba(255,255,245,0.1);
            border: 1px solid rgba(230,210,140,0.5);
            border-radius: 60px;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            color: #f0e9d8;
            cursor: pointer;
            margin-top: 12px;
        }
        .tfa-row { display: flex; align-items: center; justify-content: space-between; margin: 15px 0 5px; display: none; }
        .tfa-label { color: #e2d5b6; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.3px; }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity:0; width:0; height:0; }
        .slider {
            position: absolute; cursor: pointer; top:0; left:0; right:0; bottom:0;
            background-color: #2a2a2e; border-radius: 34px; transition: 0.2s;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
            background-color: #ddd6c5; border-radius: 50%; transition: 0.2s;
        }
        input:checked + .slider { background-color: #c9aa5f; }
        input:checked + .slider:before { transform: translateX(20px); }
        .create-btn {
            display: block; width: 100%; text-align: center;
            background: rgba(30,32,42,0.7); border: 1px solid rgba(210,180,100,0.4);
            border-radius: 60px; padding: 12px; font-size: 0.95rem;
            color: #e2d5b6; cursor: pointer; margin-top: 28px;
        }

        .loading-mask {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.94); backdrop-filter: blur(24px); z-index: 3000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            visibility: hidden; opacity: 0; transition: opacity 0.45s;
            color: white;
        }
        .spinner-anim {
            width: 56px; height: 56px; border: 3px solid rgba(255,255,240,0.2);
            border-top: 3px solid #f5e2b0; border-radius: 50%;
            animation: spinSlow 2.4s linear infinite; margin-bottom: 1.8rem;
        }
        @keyframes spinSlow { 100% { transform: rotate(360deg); } }
        .loading-sub {
            font-size: 1rem;
            text-align: center;
            background: rgba(0,0,0,0.55);
            padding: 10px 22px;
            border-radius: 60px;
            max-width: 80%;
            font-family: 'Times New Roman', Georgia, 'Playfair Display', serif;
            font-style: normal;
            font-weight: 400;
            backdrop-filter: blur(8px);
            transition: opacity 0.25s ease-in-out;
        }
        .toast-banner {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); border-left: 4px solid #b95c2a;
            border-radius: 32px; padding: 12px 24px; color: #f2e5cf; font-size: 0.85rem;
            z-index: 4000; opacity: 0; transition: opacity 0.25s; pointer-events: auto;
        }

        /* 年龄门 */
        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); z-index: 6000;
            display: flex; align-items: center; justify-content: center;
            visibility: hidden; opacity:0; transition: 0.2s;
        }
        .age-card {
            background: #14161e; border-radius: 48px; padding: 28px 24px;
            max-width: 400px; width: 85%; text-align: center;
            border: 1px solid rgba(210,180,100,0.5);
        }
        .age-buttons { display: flex; flex-direction: column; gap: 20px; margin: 28px 0; }
        .age-option {
            display: flex; align-items: center; justify-content: center; gap: 16px;
            background: rgba(30,32,45,0.9); border-radius: 80px; padding: 14px 20px;
            cursor: pointer; border: 1px solid rgba(220,190,100,0.4);
        }
        .age-option svg { width: 40px; height: 40px; display: block; }
        .age-option span { font-size: 1.2rem; font-weight: 500; color: #ecdca8; }
        .age-option:hover { background: #2f3540; transform: scale(1.01); }
        .back-from-age { background: transparent; border: 1px solid #846c3a; padding: 10px; border-radius: 60px; color: #d8c78e; cursor: pointer; margin-top: 16px; width: 100%; }
        .warning-message { color: #f3cca3; font-size: 0.9rem; margin-bottom: 20px; line-height: 1.4; }
        .confirm-card { background: #14161e; border-radius: 32px; padding: 24px; max-width: 320px; text-align: center; border: 1px solid rgba(210,180,100,0.4); }
        .confirm-card p { color: #f2e5cf; font-size: 0.9rem; margin-bottom: 8px; }
        .confirm-btns { display: flex; gap: 20px; justify-content: center; margin-top: 20px; }
        .confirm-btns button { background: #2f2f3a; border: none; padding: 8px 28px; border-radius: 40px; color: white; cursor: pointer; }

        /* 下拉菜单 */
        .custom-select { position: relative; width: 100%; margin-bottom: 20px; }
        .select-trigger {
            background: rgba(15,15,22,0.9); border: 1px solid rgba(255,255,210,0.3);
            border-radius: 60px; padding: 14px 20px; color: #f0ede8;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }
        .select-dropdown {
            position: absolute; top: 58px; left: 0; width: 100%;
            background: #181c24; border-radius: 24px; border: 1px solid #3a3a44;
            max-height: 280px; overflow-y: auto; z-index: 200; display: none;
            flex-direction: column;
        }
        .select-dropdown.show { display: flex; }
        .dropdown-search { padding: 10px; border-bottom: 1px solid #3a3a44; }
        .dropdown-search input {
            width: 100%; background: #0f0f16; border: 1px solid #4a4a55;
            border-radius: 40px; padding: 10px 14px; color: white;
            outline: none; font-size: 0.85rem;
        }
        .options-list { max-height: 200px; overflow-y: auto; }
        .select-option { padding: 12px 18px; cursor: pointer; color: #e2d5c0; transition: 0.1s; }
        .select-option:hover { background: #2f3540; }

        /* 光斑特效 */
        .hover-glow {
            position: absolute; width: 130px; height: 130px;
            background: radial-gradient(circle, rgba(255,240,180,0.18) 0%, rgba(200,180,100,0.04) 60%, rgba(0,0,0,0) 90%);
            border-radius: 50%; filter: blur(18px); pointer-events: none;
            transform: translate(-50%, -50%); opacity: 0; transition: opacity 0.12s; z-index: 1;
        }
        .btn-ripple {
            position: absolute; border-radius: 50%;
            background: radial-gradient(circle, rgba(230,210,130,0.35) 0%, rgba(200,170,80,0.1) 80%);
            transform: scale(0); animation: rippleSlow 1.2s ease-out forwards;
            pointer-events: none; filter: blur(4px);
        }
        @keyframes rippleSlow { 100% { transform: scale(12); opacity: 0; } }
        .star {
            position: absolute; background: rgba(210,200,160,0.3); border-radius: 50%;
            pointer-events: none; opacity: 0.22;
        }
        .star-flicker { animation: starBlink 0.18s ease-in-out 2; }
        @keyframes starBlink { 50% { opacity: 0.02; transform: scale(0.92); } }
    </style>
</head>
<body>
<div class="bg-layer"></div>
<div class="top-nav"><button id="homeBtn" class="nav-home">Home</button></div>

<div class="card" id="appRoot">
    <div class="brand"><h1>iubanova MyAccount</h1><div class="byline" id="bylineText"></div></div>
    <div id="oauthSection">
        <div class="oauth-group">
            <div class="oauth-btn" data-provider="apple"><img src="https://uplgov.github.io/iubanova-TestOnly/images/icons/Apple_Computer_Logo_rainbow.svg-2.png.webp" alt="apple"> Continue with Apple</div>
            <div class="oauth-btn" data-provider="google"><img src="https://uplgov.github.io/iubanova-TestOnly/images/icons/OIP.dRKwxGHP0QfrWYS-rLkpfwHaDF.webp" alt="google"> Continue with Google</div>
            <div class="oauth-btn" data-provider="facebook"><img src="https://uplgov.github.io/iubanova-TestOnly/images/icons/21502363017elftwydqhsq2hfno5hr10fwmuvvqrozvbwd5focfqjeticuaeu5nftu8jp65rtarcvksy8ycpafitbgh5jia7ttf2gaqubc7liz7.png" alt="facebook"> Continue with Facebook</div>
            <div class="oauth-btn" data-provider="wechat"><img src="https://uplgov.github.io/iubanova-TestOnly/images/icons/WeChat-logo.png" alt="wechat"> Continue with WeChat</div>
        </div>
    </div>
    <div class="divider"><span class="line"></span> OR <span class="line"></span></div>
    <div id="loginFormArea">
        <div class="input-group" id="identifierGroup">
            <input type="text" id="identifierInput" class="input-field" placeholder="Username, Email or Phone Number" autocomplete="off">
            <div id="arrowBtn" class="arrow-icon" style="display: none;">→</div>
        </div>
        <div id="passwordGroup" style="display: none;"><div class="input-group"><input type="password" id="passwordInput" class="input-field" placeholder="Password"></div></div>
        <div class="tfa-row" id="tfaRow"><span class="tfa-label">Two-Factor Authentication (2FA)</span><label class="switch"><input type="checkbox" id="tfaToggle"><span class="slider"></span></label></div>
        <div id="tfaCodeGroup" style="display: none;"><div class="input-group"><input type="text" id="tfaCode" class="input-field" placeholder="Authentication code"></div></div>
        <button id="submitLoginBtn" class="submit-btn">Submit</button>
    </div>
    <button id="createAccountBtn" class="create-btn">——  Create an account  ——</button>
</div>

<div id="loadingOverlay" class="loading-mask"><div class="spinner-anim"></div><div id="loadingMessage" class="loading-sub"> </div></div>
<div id="toastMessage" class="toast-banner"></div>
<div id="ageGateModal" class="modal-overlay"><div class="age-card" id="ageCardContainer"></div></div>

<script>
    (function(){
        // byline
        const bylines = ["Your account. Your preferences. Your pace.", "This page belongs only to you. Between light and shadow, you decide when to arrive.", "The place to govern all your services.", "Your service hub. Everything within reach."];
        document.getElementById('bylineText').innerText = bylines[Math.floor(Math.random() * bylines.length)];

        // 加载字幕 - 平滑过渡，保留衬线字体但取消斜体
        const subtitlesMap = [
            "Use ⌘ + D to add our website to your Favourites in Safari.",
            "A restless melody is playing.",
            "Fancy brewing a cup of tea while you wait?",
            "We're preparing some fine content for you.",
            "Press ⌘ + H to hide the current window and do something else while you wait.",
            "Please bear with us for a moment.",
            "Warming up the Hemi™ V8.",
            "Wake your chaos. Drink Camellipinigrum Coffeypuniceus.™",
            "Almost there.",
            "A good internet connection reduces loading time.",
            "The first dusk falls, and all things draw near their readiness. Stay but a moment—all shall be complete.",
            "We will present it to you shortly."
        ];
        let subtitleInterval = null;
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingMsgDiv = document.getElementById('loadingMessage');
        const toastEl = document.getElementById('toastMessage');
        let toastTimeout = null;
        
        function startRandomSubtitle() {
            if(subtitleInterval) clearInterval(subtitleInterval);
            let currentIdx = Math.floor(Math.random() * subtitlesMap.length);
            loadingMsgDiv.innerText = subtitlesMap[currentIdx];
            loadingMsgDiv.style.opacity = '1';
            subtitleInterval = setInterval(() => {
                loadingMsgDiv.style.opacity = '0';
                setTimeout(() => {
                    let newIdx = Math.floor(Math.random() * subtitlesMap.length);
                    if(newIdx === currentIdx) newIdx = (newIdx + 1) % subtitlesMap.length;
                    currentIdx = newIdx;
                    loadingMsgDiv.innerText = subtitlesMap[currentIdx];
                    loadingMsgDiv.style.opacity = '1';
                }, 200);
            }, 2600);
        }
        function stopRandomSubtitle() { if(subtitleInterval) clearInterval(subtitleInterval); subtitleInterval = null; }
        function showLoading() { startRandomSubtitle(); loadingOverlay.style.visibility = 'visible'; loadingOverlay.style.opacity = '1'; }
        function hideLoading() { stopRandomSubtitle(); loadingOverlay.style.opacity = '0'; setTimeout(() => { loadingOverlay.style.visibility = 'hidden'; }, 400); }
        function showFailureToast() {
            if(toastTimeout) clearTimeout(toastTimeout);
            toastEl.innerText = "We apologise, but the login attempt has failed. For reasons currently undetermined, your request could not be routed to the iubanova online service.";
            toastEl.style.opacity = '1';
            toastTimeout = setTimeout(() => { if(toastEl.style.opacity === '1') toastEl.style.opacity = '0'; }, 5000);
            toastEl.onmouseenter = () => { if(toastTimeout) clearTimeout(toastTimeout); };
            toastEl.onmouseleave = () => { toastTimeout = setTimeout(() => { if(toastEl.style.opacity === '1') toastEl.style.opacity = '0'; }, 5000); };
        }
        async function fakeLongLoading() { showLoading(); await new Promise(r => setTimeout(r, 6500)); hideLoading(); showFailureToast(); }

        // 光斑特效
        function addRipple(btn, event) {
            const rect = btn.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height) * 1.2;
            let x = event.clientX - rect.left, y = event.clientY - rect.top;
            const ripple = document.createElement('span');
            ripple.className = 'btn-ripple';
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (x - size/2) + 'px';
            ripple.style.top = (y - size/2) + 'px';
            btn.style.position = 'relative';
            btn.style.overflow = 'hidden';
            btn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 1200);
        }
        let currentBlinkingStar = null;
        function addSubtleStars(btn) {
            if(!btn.matches(':hover')) return;
            if(currentBlinkingStar && document.body.contains(currentBlinkingStar)) return;
            if(btn.querySelectorAll('.star').length >= 6) return;
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1;
            star.style.width = size+'px'; star.style.height = size+'px';
            star.style.left = (Math.random() * (btn.clientWidth - 16) + 8) + 'px';
            star.style.top = (Math.random() * (btn.clientHeight - 16) + 8) + 'px';
            btn.appendChild(star);
            currentBlinkingStar = star;
            star.classList.add('star-flicker');
            setTimeout(() => { if(star && star.parentNode) star.remove(); if(currentBlinkingStar === star) currentBlinkingStar = null; }, 400);
        }
        function attachHoverEffects(btn) {
            let glowDiv = null, starInterval = null;
            btn.addEventListener('mouseenter', () => {
                if(!glowDiv) { glowDiv = document.createElement('div'); glowDiv.className = 'hover-glow'; btn.style.position = 'relative'; btn.appendChild(glowDiv); }
                const scheduleStar = () => { if(!btn.matches(':hover')) return; if(!currentBlinkingStar) addSubtleStars(btn); };
                starInterval = setInterval(scheduleStar, 620);
                function updateGlow(e) {
                    if(!glowDiv) return;
                    const rect = btn.getBoundingClientRect();
                    let x = e.clientX - rect.left, y = e.clientY - rect.top;
                    x = Math.min(Math.max(x,0), rect.width);
                    y = Math.min(Math.max(y,0), rect.height);
                    glowDiv.style.left = x + 'px';
                    glowDiv.style.top = y + 'px';
                    glowDiv.style.opacity = '0.65';
                }
                btn.addEventListener('mousemove', updateGlow);
                btn.addEventListener('mouseleave', function onLeave() {
                    if(glowDiv) glowDiv.style.opacity = '0';
                    if(starInterval) clearInterval(starInterval);
                    if(currentBlinkingStar && currentBlinkingStar.parentNode) currentBlinkingStar.remove();
                    currentBlinkingStar = null;
                    btn.removeEventListener('mousemove', updateGlow);
                    btn.removeEventListener('mouseleave', onLeave);
                });
            });
        }
        function attachClickWave(btn) { btn.addEventListener('click', (e) => addRipple(btn, e)); btn.addEventListener('mousedown', (e) => addRipple(btn, e)); }
        function applyEffects(selector) { document.querySelectorAll(selector).forEach(btn => { attachHoverEffects(btn); attachClickWave(btn); }); }

        // 登录表单逻辑
        const identifierInput = document.getElementById('identifierInput');
        const arrowDiv = document.getElementById('arrowBtn');
        const passwordGroup = document.getElementById('passwordGroup');
        const tfaRow = document.getElementById('tfaRow');
        const tfaToggle = document.getElementById('tfaToggle');
        const tfaCodeGroup = document.getElementById('tfaCodeGroup');
        const submitBtn = document.getElementById('submitLoginBtn');

        identifierInput.addEventListener('input', () => {
            if(identifierInput.value.trim().length > 0) { arrowDiv.style.display = 'flex'; tfaRow.style.display = 'flex'; }
            else { arrowDiv.style.display = 'none'; tfaRow.style.display = 'none'; passwordGroup.style.display = 'none'; tfaCodeGroup.style.display = 'none'; if(tfaToggle.checked) tfaToggle.checked = false; }
        });
        async function onArrowOrReturn() {
            if(!identifierInput.value.trim()) return;
            arrowDiv.style.display = 'none';
            const originalHtml = arrowDiv.innerHTML;
            arrowDiv.innerHTML = '<div class="spinner-anim" style="width:18px;height:18px;border-width:2px;margin:0;"></div>';
            await new Promise(r => setTimeout(r, 1000));
            arrowDiv.innerHTML = originalHtml;
            arrowDiv.style.display = 'flex';
            passwordGroup.style.display = 'block';
            if(tfaToggle.checked) tfaCodeGroup.style.display = 'block'; else tfaCodeGroup.style.display = 'none';
        }
        arrowDiv.addEventListener('click', onArrowOrReturn);
        identifierInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') onArrowOrReturn(); });
        tfaToggle.addEventListener('change', () => { if(tfaToggle.checked && passwordGroup.style.display === 'block') tfaCodeGroup.style.display = 'block'; else tfaCodeGroup.style.display = 'none'; });
        submitBtn.addEventListener('click', async () => { if(passwordGroup.style.display === 'block') fakeLongLoading(); });
        
        function oauthHandler(e) { e.preventDefault(); fakeLongLoading(); }
        document.querySelectorAll('.oauth-btn').forEach(btn => btn.addEventListener('click', oauthHandler));

        document.getElementById('homeBtn').addEventListener('click', () => { window.location.href = 'https://uplgov.github.io/iubanova-TestOnly/Prime-Universe/en-GB.html'; });

        // 年龄门
        const ageModal = document.getElementById('ageGateModal');
        const ageCardContainer = document.getElementById('ageCardContainer');
        let ageResolve = null;
        function showAgeGate() {
            return new Promise((resolve) => {
                ageResolve = resolve;
                ageCardContainer.innerHTML = `
                    <div class="age-buttons">
                        <div class="age-option" data-age="adult">

        async function showPhoneConfirm(phone, country) {
            return new Promise((resolve) => {
                let modal = document.getElementById('confirmModal');
                if(!modal) { modal = document.createElement('div'); modal.id='confirmModal'; modal.className='modal-overlay'; document.body.appendChild(modal); }
                modal.innerHTML = `<div class="confirm-card"><p>Is this number correct? ${country.dial} ${phone}. We will send an OTP to verify it.</p><div class="confirm-btns"><button id="confYes">Yes</button><button id="confNo">No</button></div></div>`;
                modal.style.visibility = 'visible'; modal.style.opacity='1';
                const yesBtn = document.getElementById('confYes'), noBtn = document.getElementById('confNo');
                const cleanup = () => { modal.style.visibility='hidden'; modal.style.opacity='0'; };
                yesBtn.onclick = () => { cleanup(); resolve(true); };
                noBtn.onclick = () => { cleanup(); resolve(false); };
            });
        }

        let createViewActive = false;
        const originalCardHTML = document.getElementById('appRoot').innerHTML;

        function restoreLoginView() {
            const container = document.getElementById('appRoot');
            container.innerHTML = originalCardHTML;
            attachPostRenderEvents();
            createViewActive = false;
        }

        function attachPostRenderEvents() {
            const idInp = document.getElementById('identifierInput');
            const arrDiv2 = document.getElementById('arrowBtn');
            const pwdGrp = document.getElementById('passwordGroup');
            const tfaRow2 = document.getElementById('tfaRow');
            const tfaToggle2 = document.getElementById('tfaToggle');
            const tfaCodeGrp2 = document.getElementById('tfaCodeGroup');
            const submit2 = document.getElementById('submitLoginBtn');
            const create2 = document.getElementById('createAccountBtn');
            if(idInp && arrDiv2) {
                idInp.oninput = () => {
                    if(idInp.value.trim().length>0){ arrDiv2.style.display='flex'; if(tfaRow2) tfaRow2.style.display='flex'; }
                    else { arrDiv2.style.display='none'; if(tfaRow2) tfaRow2.style.display='none'; pwdGrp.style.display='none'; if(tfaCodeGrp2) tfaCodeGrp2.style.display='none'; if(tfaToggle2) tfaToggle2.checked=false; }
                };
                arrDiv2.onclick = onArrowOrReturn;
                idInp.onkeypress = (e) => { if(e.key === 'Enter') onArrowOrReturn(); };
            }
            if(tfaToggle2) tfaToggle2.onchange = () => { if(tfaToggle2.checked && pwdGrp && pwdGrp.style.display==='block') tfaCodeGrp2.style.display='block'; else if(tfaCodeGrp2) tfaCodeGrp2.style.display='none'; };
            if(submit2) submit2.onclick = async () => { if(pwdGrp && pwdGrp.style.display==='block') fakeLongLoading(); };
            if(create2) create2.onclick = async () => { const r = await showAgeGate(); if(r==='adult') buildCreateAccountView(); };
            document.querySelectorAll('.oauth-btn').forEach(btn => { btn.onclick = oauthHandler; attachHoverEffects(btn); attachClickWave(btn); });
            applyEffects('.submit-btn, .create-btn');
        }

        function buildCreateAccountView() {
            if(createViewActive) return;
            createViewActive = true;
            const container = document.getElementById('appRoot');
            container.innerHTML = `
                <div class="brand"><h1>iubanova MyAccount</h1><div class="byline">Join the space</div></div>
                <div class="oauth-group" id="createOauthGroup"></div>
                <div class="divider"><span class="line"></span> Sign up with phone or email <span class="line"></span></div>
                <div class="custom-select" id="phoneSelectWrapper">
                    <div class="select-trigger" id="selectTrigger">Select country / region</div>
                    <div class="select-dropdown" id="selectDropdown">
                        <div class="dropdown-search"><input type="text" id="countrySearchInput" placeholder="Search country, code or alias (uk, usa)..."></div>
                        <div class="options-list" id="optionsList"></div>
                    </div>
                </div>
                <div style="display:flex; gap:12px; margin-bottom:20px;"><input type="text" id="phoneNumberInput" class="input-field" placeholder="Phone number"><button id="phoneContinueBtn" class="oauth-btn" style="width:auto; padding:12px 20px;"><img src="https://uplgov.github.io/iubanova-TestOnly/images/icons/blue-2024619_1280.png" width="24"> Continue</button></div>
                <div class="divider"><span class="line"></span></div>
                <div style="display:flex; gap:12px;"><input type="email" id="emailSignupInput" class="input-field" placeholder="Email address"><button id="emailContinueBtn" class="oauth-btn" style="width:auto; padding:12px 20px;"><img src="https://uplgov.github.io/iubanova-TestOnly/images/icons/R.2c94e80bc439f8ac26eed33063918083.png" width="24"> Continue</button></div>
                <button id="backToLoginBtn" class="create-btn" style="margin-top:32px;">← Back to Login</button>
            `;
            const originalOauth = document.querySelector('#oauthSection .oauth-group');
            if(originalOauth) document.getElementById('createOauthGroup').innerHTML = originalOauth.cloneNode(true).innerHTML;
            
            let selectedCountry = countriesList.find(c => c.name === "United States") || countriesList[0];
            const trigger = document.getElementById('selectTrigger');
            const dropdown = document.getElementById('selectDropdown');
            const optionsList = document.getElementById('optionsList');
            const searchInput = document.getElementById('countrySearchInput');
            
            function matchesCountry(country, query) {
                const q = query.toLowerCase();
                if (country.name.toLowerCase().includes(q)) return true;
                if (country.dial.includes(q)) return true;
                if (country.aliases.some(alias => alias.toLowerCase().includes(q))) return true;
                return false;
            }
            
            function renderCountryOptions(filter = "") {
                const filtered = countriesList.filter(c => matchesCountry(c, filter));
                optionsList.innerHTML = '';
                filtered.forEach(c => {
                    const opt = document.createElement('div');
                    opt.className = 'select-option';
                    opt.innerText = `${c.name} (${c.dial})`;
                    opt.onclick = (e) => { e.stopPropagation(); selectedCountry = c; trigger.innerText = `${c.name} ${c.dial}`; dropdown.classList.remove('show'); };
                    optionsList.appendChild(opt);
                });
                if(filtered.length === 0) optionsList.innerHTML = '<div class="select-option">No results</div>';
            }
            trigger.innerText = `${selectedCountry.name} ${selectedCountry.dial}`;
            trigger.onclick = (e) => { e.stopPropagation(); dropdown.classList.toggle('show'); if(searchInput) renderCountryOptions(searchInput.value); };
            if(searchInput) searchInput.oninput = (e) => { renderCountryOptions(e.target.value); dropdown.classList.add('show'); };
            document.addEventListener('click', (e) => { if(dropdown && !dropdown.contains(e.target) && e.target !== trigger) dropdown.classList.remove('show'); });
            renderCountryOptions("");
            
            document.getElementById('phoneContinueBtn').onclick = async () => {
                const phone = document.getElementById('phoneNumberInput').value.trim();
                if(!phone) return;
                if(await showPhoneConfirm(phone, selectedCountry)) fakeLongLoading();
            };
            document.getElementById('emailContinueBtn').onclick = () => {
                const email = document.getElementById('emailSignupInput').value.trim();
                if(!email.includes('@') || !email.includes('.')) { alert("Please enter a valid email address"); return; }
                fakeLongLoading();
            };
            document.getElementById('backToLoginBtn').onclick = () => restoreLoginView();
            document.querySelectorAll('#createOauthGroup .oauth-btn').forEach(btn => { btn.onclick = oauthHandler; attachHoverEffects(btn); attachClickWave(btn); });
            attachHoverEffects(document.getElementById('phoneContinueBtn')); attachClickWave(document.getElementById('phoneContinueBtn'));
            attachHoverEffects(document.getElementById('emailContinueBtn')); attachClickWave(document.getElementById('emailContinueBtn'));
            attachHoverEffects(document.getElementById('backToLoginBtn')); attachClickWave(document.getElementById('backToLoginBtn'));
        }

        attachPostRenderEvents();
        applyEffects('.oauth-btn, .submit-btn, .create-btn');
    })();
